# Simplest deployment: one container, SQLite + in-process model + eager tasks.
# Persists the DB, model and uploads in a named volume.
#   docker compose -f docker-compose.deploy.yml up --build -d
#   open http://localhost:8000
#
# For the full multi-service stack (Postgres, Redis, Celery worker, separate
# model server, MLflow), use docker-compose.yml instead.

services:
  web:
    build: { context: ., dockerfile: Dockerfile }
    ports: ["8000:8000"]
    environment:
      # Change this for any real/public deployment.
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me-please}"
      # Demo-open (no login). To lock it down: DJANGO_DEBUG=0 REQUIRE_AUTH=1
      # and mint a token with `manage.py create_api_token`.
      REQUIRE_AUTH: "0"
    volumes:
      - appdata:/app/data          # DB + champion model + uploaded files
    restart: unless-stopped

volumes:
  appdata:
